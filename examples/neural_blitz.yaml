# Neural Blitz NG example configuration
# Copy to neural_blitz.yaml and adjust for your environment.

defaults:
  count: 1000
  size: 64
  concurrency: 50
  timeout: 2.0
  rate: 1000
  warmup: 50
  max_retries: 0
  co_correction: true

monitor:
  bind: "0.0.0.0"
  http_port: 8888
  interval: 30
  history_limit: 100

targets:
  - label: local
    host: 127.0.0.1
    port: 9999
    sla: examples/sla.yaml

server:
  bind: 127.0.0.1
  port: 9999
